# route_rules.yaml
# Version: v2026.04
# Scope: SEA_DIRECT, SEA_TRANSSHIP, SEA_LAND MVP route generation rules
---
version: v2026.04
supported_routes:
  - SEA_DIRECT
  - SEA_TRANSSHIP
  - SEA_LAND

# Hub restrictions
hubs:
  - code: DXB
    name: Jebel Ali
    allowed_cargo_types:
      - GENERAL
      - OOG
      - HEAVY_LIFT
  - code: DUB
    name: Jebel Ali
    allowed_cargo_types:
      - GENERAL
      - OOG
      - HEAVY_LIFT
  - code: AUH
    name: Khalifa Port
    allowed_cargo_types:
      - GENERAL

# Route-specific rules
route_config:
  SEA_DIRECT:
    allowed_modes:
      - SEA
    max_legs: 1
    min_legs: 1
    requires_inland_leg: false
    max_weight_kg: 30000
    cargo_restrictions:
      OOG: blocked
      HEAVY_LIFT: blocked

  SEA_TRANSSHIP:
    allowed_modes:
      - SEA
    max_legs: 2
    min_legs: 2
    requires_inland_leg: false
    max_weight_kg: 25000
    cargo_restrictions:
      OOG: allowed
      HEAVY_LIFT: allowed

  SEA_LAND:
    allowed_modes:
      - SEA
      - LAND
    max_legs: 2
    min_legs: 2
    requires_inland_leg: true
    inland_final_leg: true
    max_weight_kg: 25000
    cargo_restrictions:
      OOG: allowed
      HEAVY_LIFT: allowed

# Weight limits per container type
container_limits:
  20GP:
    max_gross_weight_kg: 30480
    max_volume_m3: 33.2
  40GP:
    max_gross_weight_kg: 30480
    max_volume_m3: 67.7
  40HC:
    max_gross_weight_kg: 30480
    max_volume_m3: 76.4
